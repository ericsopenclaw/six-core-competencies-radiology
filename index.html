  <style>

    button {

    button:hover { transform: translateY(-1px); border-color: var(--teacher); }

    button.primary { border: 0; color: #061018; background: linear-gradient(135deg, var(--teacher), var(--student)); font-weight: 900; }
    .hint { color: var(--muted); font-size: 16px; }
    .drawer {
      position: fixed;

    .drawer.open { display: block; }

    .row { display: grid; gap: 8px; margin: 14px 0; color: var(--muted); }

    .toc { max-height: 42vh; overflow: auto; display: grid; gap: 8px; }
    .toc button { text-align: left; min-height: 42px; border-radius: 12px; padding: 10px 12px; color: var(--muted); }
    .toc button.active { color: var(--text); border-color: var(--student); }

    @media (max-width: 820px) {
      .app { padding: 10px; gap: 10px; }

      body { overflow: visible; background: #fff; color: #000; }

      .print-all h2 { font-size: 32px; margin-top: 1.4em; }
      .print-all .print-role { font-weight: 900; margin-top: 1em; }
    }

  <script>
    const roleNames = {
      teacher: { label: '主治醫師兼臨床教師', short: '老師' },
      student: { label: '醫學實習生', short: '學生' }
    };

    const slides = [
      {
            "kicker": "第 1 章｜開場：主治醫師的臨床角色",
            "title": "從急診中風病人，看放射科主治醫師如何參與臨床照護",
            "time": "建議：約 1 分 40 秒",
            "tags": [
                  "主治醫師主角",
                  "急診中風",
                  "病人照護"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "大家好，我是 ___。這次影片我想用一個急診中風病人的照護流程，分享身為放射科主治醫師，如何在臨床工作中實踐六大核心能力。"
                        ]
                  },
                  {
                        "role": "student",
                        "text": [
                              "老師，所以今天的重點不是由學生分享見習心得，而是請老師用臨床教師和主治醫師的角度，帶我們看一個真實臨床流程。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "對。放射科醫師不一定每天站在病床旁邊，但在急性中風這種情境，我們其實非常靠近病人的治療決策。影像判讀是否快速、報告是否精準、通報是否即時，都可能影響病人能不能接受取栓治療。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "我們用一個去識別化的情境來看：一位病人因為突然單側肢體無力、語言不清被送到急診，急診啟動 stroke code。臨床團隊最想知道的是：有沒有顱內出血？是不是缺血性中風？有沒有大血管阻塞？病人是否適合接受血管內取栓？"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "在這個流程中，我作為放射科主治醫師的任務，不只是把影像看完，而是要在有限時間內提供必要、精確、能被臨床團隊立即使用的資訊。這就是病人照護的核心。"
                        ]
                  }
            ]
      },
      {
            "kicker": "第 2 章｜醫學知識：影像如何變成決策",
            "title": "主治醫師要把 CT、CTA、灌流資訊轉成治療方向",
            "time": "建議：約 1 分 55 秒",
            "tags": [
                  "醫學知識",
                  "NCCT / CTA / CTP",
                  "臨床決策"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "老師，在急診中風病人身上，放射科主治醫師最需要掌握哪些判斷？"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "我會先把問題拆成幾個層次。第一，non-contrast CT 要先排除顱內出血，因為出血性中風和缺血性中風的治療完全不同。第二，要看早期缺血變化嚴不嚴重，例如用 ASPECTS 來協助評估已經受損的範圍。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "第三，CTA 要判斷有沒有 large vessel occlusion，例如 ICA terminus、M1、basilar artery 等位置。第四，如果病人時間窗比較晚，或臨床和影像需要進一步判斷，CT perfusion 可以協助評估 infarct core 和 penumbra。"
                        ]
                  },
                  {
                        "role": "student",
                        "text": [
                              "所以老師看的不是單一影像，而是把影像、神經學症狀、時間窗和治療選項整合起來。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "沒錯。舉例來說，如果 CT 沒有出血，ASPECTS 還可以，CTA 顯示右側 M1 occlusion，而且病人的症狀和右側 MCA territory 符合，那我在報告和通報時就會很明確地指出：這是可能適合取栓的急性大血管阻塞。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "這裡的醫學知識不是只背影像徵象，而是要把解剖、病理生理、治療 guideline 和病人狀況整合起來，讓影像資訊真正轉化成臨床決策。"
                        ]
                  }
            ]
      },
      {
            "kicker": "第 3 章｜病人照護：從診斷到取栓",
            "title": "放射科主治醫師不只提供診斷，也參與治療與追蹤",
            "time": "建議：約 2 分 05 秒",
            "tags": [
                  "病人照護",
                  "腦中風取栓",
                  "侵入性診療程序"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "老師，這個病人如果後來進入腦中風取栓流程，放射科主治醫師的角色是不是更直接？"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "是的。急性腦中風取栓是一個很好的例子，說明放射科不只是診斷科別。在神經介入團隊中，放射科醫師可能同時是影像判讀者，也是執行血管內治療的醫師。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "病人能不能取栓，前面要靠影像判斷；真正進到 angiography suite 後，還要透過導管、取栓裝置，把阻塞血管重新打通，盡量恢復腦部灌流。這個過程需要影像導引、解剖知識、技術操作，也需要快速但謹慎的臨床判斷。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "在病人照護的角度，我需要和神經內科、急診、麻醉、護理師、放射師密切合作，確認適應症、禁忌症、生命徵象、用藥狀況，以及病人是否能安全進入治療流程。"
                        ]
                  },
                  {
                        "role": "student",
                        "text": [
                              "所以這不只是「看到 M1 occlusion」而已，而是一路連到病人是否能接受治療、治療是否安全、治療後怎麼追蹤。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "對。取栓後也不能結束。我要確認再通情形，例如 TICI score，也要注意有沒有出血轉化、腦水腫或其他併發症。後續 CT 或 MRI 追蹤，會影響抗血栓治療時機、預後評估和後續照護計畫。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "因此在這個案例裡，放射科主治醫師的病人照護，是從急診影像判讀開始，延伸到取栓治療，再延伸到術後追蹤與團隊討論。"
                        ]
                  }
            ]
      },
      {
            "kicker": "第 4 章｜溝通技巧：主治醫師的一通電話",
            "title": "危急值通報不是完成程序，而是啟動治療行動",
            "time": "建議：約 1 分 55 秒",
            "tags": [
                  "人際溝通技巧",
                  "危急值通報",
                  "同理心"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "老師，如果 CTA 已經看到大血管阻塞，主治醫師除了寫報告，還會做什麼？"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "我一定會主動通報。急性中風不是可以慢慢等報告被看到的情境。當我看到右側 M1 occlusion，而且影像上沒有明顯大範圍不可逆梗塞時，我會立刻聯繫 stroke team 或急診主責醫師。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "通報時，我會盡量把訊息講得清楚而可執行。例如：「這位病人 non-contrast CT 目前沒有顱內出血，CTA 顯示右側 M1 occlusion，影像和症狀符合急性大血管阻塞，建議立即通知神經介入團隊評估取栓。」"
                        ]
                  },
                  {
                        "role": "student",
                        "text": [
                              "這樣臨床團隊可以直接知道下一步，不會只收到一個模糊的「影像有問題」。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "對。溝通技巧的重點不是講很多，而是讓關鍵訊息被正確接收，並且能推動病人照護。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "另外，同理心也很重要。中風病人和家屬常常是在非常突然、非常焦急的狀態下面對治療決定。雖然主要說明可能由神經內科或介入團隊進行，但放射科主治醫師在團隊討論時，也要用病人和家屬能理解的方式，協助說明影像代表的意義、取栓的目的、可能風險，以及時間急迫性。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "好的溝通，一方面讓團隊更快行動，另一方面也讓病人和家屬在急迫情境中感受到被尊重。"
                        ]
                  }
            ]
      },
      {
            "kicker": "第 5 章｜制度與專業素養",
            "title": "中風取栓不是個人英雄，而是主治醫師帶著團隊跑流程",
            "time": "建議：約 2 分 10 秒",
            "tags": [
                  "制度下之臨床工作",
                  "專業素養",
                  "團隊合作"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "老師，中風取栓好像也很能呈現制度下的臨床工作。因為不是單靠某一個人快就好，而是整條流程都要快。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "完全正確。急性中風照護是一條系統流程。從急診檢傷、stroke code 啟動、抽血、影像檢查安排、CT room availability、影像判讀、危急值通報、家屬說明、麻醉評估，到 angiography suite 準備，每一段都會影響 door-to-puncture time。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "作為主治醫師，我不能只關心自己有沒有看對影像，也要關心流程能不能順利運作。例如 stroke CT protocol 是否清楚？CTA 是否即時完成？影像傳輸有沒有延遲？LVO 發現後通報誰？神經介入團隊如何啟動？這些都需要平常就建立共識。"
                        ]
                  },
                  {
                        "role": "student",
                        "text": [
                              "所以制度下的臨床工作，不只是知道醫院有什麼規定，而是理解整個系統，並且讓系統真的幫助病人。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "對。專業素養也在這裡展現。急診中風取栓的壓力很大，但主治醫師仍要在速度和準確之間保持平衡，要誠實面對風險，尊重病人和家屬，也要保護病人隱私。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "尤其影片或教學中使用影像時，更要注意去識別化，不能出現姓名、病歷號、檢查編號或任何可辨識病人的資訊。這不是形式上的規定，而是醫師專業素養的一部分。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "所以在這個中風案例裡，主治醫師的角色不只是技術操作者，也是流程協調者、品質把關者，以及專業價值的實踐者。"
                        ]
                  }
            ]
      },
      {
            "kicker": "第 6 章｜學習改進與總結",
            "title": "主治醫師從每一例中風取栓，持續改善照護品質",
            "time": "建議：約 2 分 00 秒",
            "tags": [
                  "從工作中學習及成長",
                  "臨床教師",
                  "總結"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "老師，最後一個核心能力是從工作中學習及成長。對主治醫師來說，已經很熟悉中風流程了，還需要怎麼學習和改進？"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "越是熟悉的流程，越需要定期回頭檢討。每一個中風取栓案例結束後，我都可以問幾個問題：影像判讀是否夠快？通報有沒有延遲？病人從到院到 CT、從 CT 到 groin puncture 花了多久？再通結果如何？有沒有出血或其他併發症？臨床結果是否符合預期？"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "這些不是為了追究誰的責任，而是為了找出可以改善的地方。也許是 protocol 可以更清楚，也許是通報流程可以更直接，也許是影像傳輸或檢查安排可以再縮短時間。"
                        ]
                  },
                  {
                        "role": "student",
                        "text": [
                              "所以學習不只是讀 guideline 或參加演講，而是把真實臨床資料拿回來分析，然後改變下一次照護病人的方式。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "對。這也是我作為臨床教師想傳達的事：六大核心能力不是住院醫師或學生才需要背的項目。對主治醫師來說，它們每天都在臨床中被使用。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "在這位急診中風病人的故事裡，醫學知識讓我判讀影像；病人照護讓我把資訊轉成治療決策；溝通技巧讓團隊能快速行動；制度下的臨床工作讓取栓流程順利啟動；專業素養讓我在壓力下守住品質與倫理；從工作中學習及成長，則讓每一次經驗都能改善下一位病人的照護。"
                        ]
                  },
                  {
                        "role": "teacher",
                        "text": [
                              "所以，放射科主治醫師不是只在螢幕後面看影像。從影像診斷到血管內取栓，從危急值通報到流程改善，我們都在病人的照護旅程中扮演重要角色。這就是今天想分享的重點，謝謝大家。"
                        ]
                  }
            ]
      }
];

    const state = {
      index: Number(localStorage.getItem('qnaSlideIndex') || 0),
      auto: false,
      timer: null,
      speed: Number(localStorage.getItem('qnaSpeed') || 3)
    };

    const el = {
      body: document.body,
      progress: document.getElementById('progress'),
      counter: document.getElementById('counter'),
      kicker: document.getElementById('kicker'),
      title: document.getElementById('title'),
      timer: document.getElementById('timer'),
      dialogue: document.getElementById('dialogue'),
      meta: document.getElementById('meta'),
      prev: document.getElementById('prev'),
      next: document.getElementById('next'),
      auto: document.getElementById('auto'),
      fullscreen: document.getElementById('fullscreen'),
      settings: document.getElementById('settings'),
      drawer: document.getElementById('drawer'),
      fontSize: document.getElementById('fontSize'),
      speed: document.getElementById('speed'),
      theme: document.getElementById('theme'),
      toc: document.getElementById('toc'),
      printAll: document.getElementById('printAll')
    };

    function emphasize(text) {
      return text
        .replaceAll('主治醫師兼臨床教師', '<strong>主治醫師兼臨床教師</strong>')
        .replaceAll('醫學實習生', '<strong>醫學實習生</strong>')
        .replaceAll('六大核心能力', '<strong>六大核心能力</strong>')
        .replaceAll('危急值通報', '<strong>危急值通報</strong>')
        .replaceAll('病人隱私', '<strong>病人隱私</strong>')
        .replaceAll('去識別化', '<strong>去識別化</strong>')
        .replaceAll('臨床決策', '<strong>臨床決策</strong>');
    }

    function render() {
      state.index = Math.max(0, Math.min(slides.length - 1, state.index));
      const slide = slides[state.index];
      el.kicker.textContent = slide.kicker;
      el.title.textContent = slide.title;
      el.timer.textContent = slide.time;
      el.dialogue.innerHTML = slide.lines.map(line => {
        const role = roleNames[line.role];
        return `<section class="line ${line.role}">
          <div class="role"><span class="badge">${role.short}</span><span>${role.label}</span></div>
          <div class="text">${line.text.map(p => `<p>${emphasize(p)}</p>`).join('')}</div>
        </section>`;
      }).join('');
      el.dialogue.scrollTop = 0;
      el.meta.innerHTML = slide.tags.map(tag => `<span class="pill">${tag}</span>`).join('');
      el.counter.textContent = `${state.index + 1} / ${slides.length}`;
      el.progress.style.width = `${((state.index + 1) / slides.length) * 100}%`;
      el.prev.disabled = state.index === 0;
      el.next.textContent = state.index === slides.length - 1 ? '回到開場 ↺' : '下一段 →';
      localStorage.setItem('qnaSlideIndex', String(state.index));
      renderToc();
    }

    function next() {
      state.index = state.index >= slides.length - 1 ? 0 : state.index + 1;
      stopAuto();
      render();
    }
    function prev() {
      state.index -= 1;
      stopAuto();
      render();
    }
    function startAuto() {
      state.auto = true;
      el.auto.textContent = '停止捲動';
      state.timer = setInterval(() => {
        el.dialogue.scrollTop += state.speed;
        const atBottom = el.dialogue.scrollTop + el.dialogue.clientHeight >= el.dialogue.scrollHeight - 4;
        if (atBottom) stopAuto();
      }, 40);
    }
    function stopAuto() {
      state.auto = false;
      el.auto.textContent = '自動捲動';
      if (state.timer) clearInterval(state.timer);
      state.timer = null;
    }
    function toggleAuto() { state.auto ? stopAuto() : startAuto(); }
    function toggleTheme() {
      const nextTheme = el.body.dataset.theme === 'dark' ? 'light' : 'dark';
      el.body.dataset.theme = nextTheme;
      localStorage.setItem('qnaTheme', nextTheme);
    }
    function renderToc() {
      el.toc.innerHTML = slides.map((slide, i) => `<button class="${i === state.index ? 'active' : ''}" data-index="${i}">${i + 1}. ${slide.title}</button>`).join('');
    }
    function renderPrint() {
      el.printAll.innerHTML = `<h1>六大核心能力｜放射科一問一答逐字稿</h1>` + slides.map((slide, i) => `
        <h2>${i + 1}. ${slide.title}</h2>
        ${slide.lines.map(line => `<div class="print-role">${roleNames[line.role].label}</div>${line.text.map(p => `<p>${p}</p>`).join('')}`).join('')}
      `).join('');
    }

    el.prev.addEventListener('click', prev);
    el.next.addEventListener('click', next);
    el.auto.addEventListener('click', toggleAuto);
    el.fullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    });
    el.settings.addEventListener('click', () => el.drawer.classList.toggle('open'));
    el.theme.addEventListener('click', toggleTheme);
    el.fontSize.addEventListener('input', e => {
      document.documentElement.style.setProperty('--font-size', `${e.target.value}px`);
      localStorage.setItem('qnaFontSize', e.target.value);
    });
    el.speed.addEventListener('input', e => {
      state.speed = Number(e.target.value);
      localStorage.setItem('qnaSpeed', e.target.value);
    });
    el.toc.addEventListener('click', e => {
      const button = e.target.closest('button[data-index]');
      if (!button) return;
      state.index = Number(button.dataset.index);
      stopAuto();
      render();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === ' ') { e.preventDefault(); toggleAuto(); }
      if (e.key.toLowerCase() === 'f') el.fullscreen.click();
      if (e.key.toLowerCase() === 't') toggleTheme();
      if (e.key === 'Escape') el.drawer.classList.remove('open');
    });

    const savedTheme = localStorage.getItem('qnaTheme');
    if (savedTheme) el.body.dataset.theme = savedTheme;
    const savedFontSize = localStorage.getItem('qnaFontSize');
    if (savedFontSize) {
      el.fontSize.value = savedFontSize;
      document.documentElement.style.setProperty('--font-size', `${savedFontSize}px`);
    }
    el.speed.value = state.speed;
    renderPrint();
    render();
  </script>
</body>
</html>
