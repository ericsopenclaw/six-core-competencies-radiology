<html lang="zh-Hant">
<head>

  <meta name="description" content="放射科醫師臨床照護六大核心能力：主治醫師兼臨床教師與醫學實習生一問一答大字報" />
  <title>六大核心能力｜放射科一問一答大字報</title>
  <style>
    :root {
      --bg: #061018;
      --surface: #0b1622;
      --surface-2: #111f2e;
      --teacher: #74d8ff;
      --student: #b8f7cf;
      --text: #f8fbff;
      --muted: #a8b7ca;
      --border: rgba(255,255,255,.15);
      --warning: #ffd166;
      --shadow: 0 24px 90px rgba(0,0,0,.42);
      --font-size: clamp(28px, 3.2vw, 42px);
      --line-height: 1.38;
      --max-width: 1320px;
    }

    [data-theme="light"] {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-2: #edf3fa;
      --teacher: #006d9c;
      --student: #087f5b;
      --text: #0d1722;
      --muted: #53667c;
      --border: rgba(10,25,41,.14);
      --warning: #9a5b00;
      --shadow: 0 22px 80px rgba(14,36,61,.15);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 8% 10%, color-mix(in srgb, var(--teacher) 25%, transparent), transparent 32%),
        radial-gradient(circle at 92% 8%, color-mix(in srgb, var(--student) 18%, transparent), transparent 30%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button { font: inherit; }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 18px;
      gap: 14px;
    }
    header, footer {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 18px;
      letter-spacing: .03em;
      white-space: nowrap;
    }
    .brand-mark {
      width: 34px;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teacher), var(--student));
      box-shadow: 0 0 28px color-mix(in srgb, var(--teacher) 45%, transparent);
    }
    .progress-wrap {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.1);
      overflow: hidden;
    }
    .progress { height: 100%; width: 0%; background: linear-gradient(90deg, var(--teacher), var(--student)); transition: width .25s ease; }
    .counter { min-width: 100px; text-align: right; color: var(--muted); font-size: 20px; }

    main {
      min-height: 0;
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      display: grid;
    }
    .card {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
      border: 1px solid var(--border);
      border-radius: 34px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      box-shadow: var(--shadow);
      padding: clamp(24px, 3.8vw, 56px);
      backdrop-filter: blur(18px);
    }
    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }
    .kicker {
      color: var(--muted);
      font-size: clamp(18px, 1.7vw, 26px);
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: clamp(36px, 5.8vw, 88px);
      line-height: 1.08;
      letter-spacing: -.04em;
      text-wrap: balance;
    }
    .timer {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: clamp(15px, 1.3vw, 20px);
      white-space: nowrap;
    }
    .dialogue {
      overflow: auto;
      padding-right: 8px;
      display: grid;
      align-content: start;
      gap: 22px;
      scroll-behavior: smooth;
    }
    .line {
      display: grid;
      grid-template-columns: minmax(150px, 220px) 1fr;
      gap: 20px;
      align-items: start;
      padding: clamp(18px, 2vw, 28px);
      border: 1px solid var(--border);
      border-radius: 28px;
      background: color-mix(in srgb, var(--surface-2) 76%, transparent);
    }
    .line.teacher { border-left: 10px solid var(--teacher); }
    .line.student { border-left: 10px solid var(--student); }
    .role {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-weight: 850;
      font-size: clamp(18px, 1.8vw, 26px);
      line-height: 1.2;
    }
    .role .badge {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 7px 12px;
      color: #061018;
      font-size: .78em;
      letter-spacing: .06em;
    }
    .teacher .badge { background: var(--teacher); }
    .student .badge { background: var(--student); }
    .text {
      font-size: var(--font-size);
      line-height: var(--line-height);
      font-weight: 780;
      letter-spacing: .005em;
      text-wrap: pretty;
    }
    .text p { margin: 0 0 .72em; }
    .text p:last-child { margin-bottom: 0; }
    .text strong { color: var(--warning); }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: clamp(15px, 1.4vw, 21px);
    }
    .pill {
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 999px;
      padding: 8px 13px;
    }
    .buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 16px;
      color: var(--text);
      background: var(--surface-2);
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease;
    }
    button:hover { transform: translateY(-1px); border-color: var(--teacher); }
    button:active { transform: translateY(0); }
    button.primary { border: 0; color: #061018; background: linear-gradient(135deg, var(--teacher), var(--student)); font-weight: 900; }
    .hint { color: var(--muted); font-size: 16px; }
    .drawer {
      position: fixed;
      right: 18px;
      top: 72px;
      width: min(400px, calc(100vw - 36px));
      z-index: 10;
      display: none;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: color-mix(in srgb, var(--surface) 96%, transparent);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(18px);
    }
    .drawer.open { display: block; }
    .drawer h2 { margin: 0 0 12px; font-size: 24px; }
    .row { display: grid; gap: 8px; margin: 14px 0; color: var(--muted); }
    input[type="range"] { width: 100%; }
    .toc { max-height: 42vh; overflow: auto; display: grid; gap: 8px; }
    .toc button { text-align: left; min-height: 42px; border-radius: 12px; padding: 10px 12px; color: var(--muted); }
    .toc button.active { color: var(--text); border-color: var(--student); }
    .print-all { display: none; }

    @media (max-width: 820px) {
      .app { padding: 10px; gap: 10px; }
      .brand { font-size: 14px; }
      .card { border-radius: 22px; padding: 18px; gap: 16px; }
      .topline { display: grid; }
      .line { grid-template-columns: 1fr; gap: 12px; border-radius: 22px; }
      .text { font-size: clamp(30px, 9vw, 52px); }
      .hint { display: none; }
    }

    @media print {
      body { overflow: visible; background: #fff; color: #000; }
      .app, .drawer { display: none; }
      .print-all { display: block; padding: 24px; font-size: 24px; line-height: 1.65; }
      .print-all h1 { font-size: 42px; }
      .print-all h2 { font-size: 32px; margin-top: 1.4em; }
      .print-all .print-role { font-weight: 900; margin-top: 1em; }
    }
  </style>
</head>

  <script>
    const roleNames = {
      teacher: { label: '主治醫師兼臨床教師', short: '老師' },
      student: { label: '醫學實習生', short: '學生' }
    };

    const slides = [
      {
            "kicker": "開場 1｜老師",
            "title": "放射科裡的臨床照護",
            "time": "建議：20 秒",
            "tags": [
                  "主治醫師兼臨床教師",
                  "看鏡頭開場"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "今天我們用一問一答的方式，聊聊放射科醫師在臨床照護中的六大核心能力。"
                        ]
                  }
            ]
      },
      {
            "kicker": "開場 2｜老師",
            "title": "影像判讀是臨床決策的關鍵",
            "time": "建議：20 秒",
            "tags": [
                  "語氣自然",
                  "不用太正式"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "很多人會覺得放射科離病人比較遠，但其實影像判讀常常是臨床決策的關鍵。"
                        ]
                  }
            ]
      },
      {
            "kicker": "開場 3｜學生",
            "title": "從學生角度提問",
            "time": "建議：25 秒",
            "tags": [
                  "醫學實習生",
                  "自然接話"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "老師，我以前也以為放射科主要是看影像、寫報告。這次想請老師帶我理解，放射科醫師怎麼把影像工作和病人照護連在一起。"
                        ]
                  }
            ]
      },
      {
            "kicker": "情境 1｜老師",
            "title": "從急診影像案例開始",
            "time": "建議：20 秒",
            "tags": [
                  "案例去識別化",
                  "可用示意圖"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "我們用一個去識別化的情境來看：一位急診病人因為急性腹痛，接受腹部電腦斷層檢查。"
                        ]
                  }
            ]
      },
      {
            "kicker": "情境 2｜老師",
            "title": "臨床團隊真正想知道什麼？",
            "time": "建議：20 秒",
            "tags": [
                  "臨床問題導向"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "臨床團隊想知道的，不只是影像長什麼樣子，而是有沒有需要立即處理的急症。"
                        ]
                  }
            ]
      },
      {
            "kicker": "情境 3｜學生",
            "title": "報告要回答臨床問題",
            "time": "建議：25 秒",
            "tags": [
                  "學生回應"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "所以這時候放射科報告不是單純描述看到什麼，而是要回答：有沒有急症？嚴重程度如何？下一步該怎麼處理？"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 1｜學生提問",
            "title": "病人照護",
            "time": "建議：15 秒",
            "tags": [
                  "六大核心能力 1"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "老師，放射科醫師在「病人照護」上，最重要的是什麼？"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 1｜老師回答",
            "title": "影像判讀的終點是治療決策",
            "time": "建議：25 秒",
            "tags": [
                  "臨床決策",
                  "報告品質"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "最重要的是記得：影像判讀的終點不是報告本身，而是病人的治療決策。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 1｜老師補充",
            "title": "報告要幫助治療選擇",
            "time": "建議：25 秒",
            "tags": [
                  "手術",
                  "介入治療",
                  "抗生素"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "報告要能幫臨床團隊判斷病人是否需要手術、介入治療、抗生素，或進一步檢查。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 1｜學生整理",
            "title": "好的報告要可執行",
            "time": "建議：22 秒",
            "tags": [
                  "病灶位置",
                  "範圍",
                  "併發症"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "也就是說，好的報告要能回答臨床真正需要的資訊，例如病灶位置、範圍、併發症，以及是否有立即危險。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 2｜老師提問",
            "title": "醫學知識",
            "time": "建議：18 秒",
            "tags": [
                  "六大核心能力 2"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "那你覺得放射科的醫學知識，和一般臨床科有什麼不同？"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 2｜學生回答",
            "title": "把影像和疾病脈絡連起來",
            "time": "建議：25 秒",
            "tags": [
                  "解剖",
                  "病理",
                  "臨床情境"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "放射科需要把解剖、病理、影像表現和臨床情境連起來。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 2｜學生補充",
            "title": "同一個影像徵象，脈絡不同意義也不同",
            "time": "建議：25 秒",
            "tags": [
                  "鑑別診斷"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "同一個影像徵象，在不同年齡、病史或症狀下，鑑別診斷可能不一樣。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 2｜老師補充",
            "title": "不確定時，要回到證據",
            "time": "建議：25 秒",
            "tags": [
                  "舊片比較",
                  "guideline",
                  "文獻"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "遇到不典型的影像表現時，不能只靠直覺。要回頭看病史、比較舊片、查 guideline 或文獻，也要願意和臨床團隊討論。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 3｜學生提問",
            "title": "臨床工作中的學習與改進",
            "time": "建議：18 秒",
            "tags": [
                  "六大核心能力 3"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "老師，放射科要怎麼在臨床工作中持續學習和改進？"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 3｜老師回答",
            "title": "回饋讓判讀更完整",
            "time": "建議：25 秒",
            "tags": [
                  "病例討論",
                  "病理結果"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "放射科很依賴回饋。病例討論、手術結果、病理結果、後續追蹤影像，都可以幫我們檢查原本的判讀是否完整。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 3｜學生整理",
            "title": "錯誤要轉成流程改進",
            "time": "建議：30 秒",
            "tags": [
                  "搜尋模式",
                  "臨床資訊",
                  "鑑別診斷"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "如果發現自己漏掉一個細節，重要的不是只記住答案，而是回頭想：是搜尋模式不完整？臨床資訊沒有整合？還是鑑別診斷想得不夠廣？"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 3｜老師總結",
            "title": "把錯誤變成進步",
            "time": "建議：15 秒",
            "tags": [
                  "反思"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "對。把錯誤轉成流程上的改進，才是臨床能力真正進步的地方。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 4｜老師提問",
            "title": "人際溝通技巧",
            "time": "建議：18 秒",
            "tags": [
                  "六大核心能力 4"
            ],
            "lines": [
                  {
                        "role": "teacher",
                        "text": [
                              "如果影像有危急發現，放射科醫師只把報告完成，這樣夠不夠？"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 4｜學生回答",
            "title": "危急發現需要及時通報",
            "time": "建議：25 秒",
            "tags": [
                  "危急值通報"
            ],
            "lines": [
                  {
                        "role": "student",
                        "text": [
                              "不夠。危急或重要發現需要及時通報，並且確認臨床團隊理解影像的嚴重性與可能的下一步。"
                        ]
                  }
            ]
      },
      {
            "kicker": "核心能力 4｜老師補充",
            "title": "溝通要清楚、精簡、可執行",
            "time": "建議：30 秒",
            "tags": [
                  "主要發現",
                  "可能診斷",
                  "下一步"
            ],

    const state = {
      index: Number(localStorage.getItem('qnaSlideIndex') || 0),
      auto: false,
      timer: null,
      speed: Number(localStorage.getItem('qnaSpeed') || 3)
    };

    const el = {
      body: document.body,
      progress: document.getElementById('progress'),
      counter: document.getElementById('counter'),
      kicker: document.getElementById('kicker'),
      title: document.getElementById('title'),
      timer: document.getElementById('timer'),
      dialogue: document.getElementById('dialogue'),
      meta: document.getElementById('meta'),
      prev: document.getElementById('prev'),
      next: document.getElementById('next'),
      auto: document.getElementById('auto'),
      fullscreen: document.getElementById('fullscreen'),
      settings: document.getElementById('settings'),
      drawer: document.getElementById('drawer'),
      fontSize: document.getElementById('fontSize'),
      speed: document.getElementById('speed'),
      theme: document.getElementById('theme'),
      toc: document.getElementById('toc'),
      printAll: document.getElementById('printAll')
    };

    function emphasize(text) {
      return text
        .replaceAll('主治醫師兼臨床教師', '<strong>主治醫師兼臨床教師</strong>')
        .replaceAll('醫學實習生', '<strong>醫學實習生</strong>')
        .replaceAll('六大核心能力', '<strong>六大核心能力</strong>')
        .replaceAll('危急值通報', '<strong>危急值通報</strong>')
        .replaceAll('病人隱私', '<strong>病人隱私</strong>')
        .replaceAll('去識別化', '<strong>去識別化</strong>')
        .replaceAll('臨床決策', '<strong>臨床決策</strong>');
    }

    function render() {
      state.index = Math.max(0, Math.min(slides.length - 1, state.index));
      const slide = slides[state.index];
      el.kicker.textContent = slide.kicker;
      el.title.textContent = slide.title;
      el.timer.textContent = slide.time;
      el.dialogue.innerHTML = slide.lines.map(line => {
        const role = roleNames[line.role];
        return `<section class="line ${line.role}">
          <div class="role"><span class="badge">${role.short}</span><span>${role.label}</span></div>
          <div class="text">${line.text.map(p => `<p>${emphasize(p)}</p>`).join('')}</div>
        </section>`;
      }).join('');
      el.dialogue.scrollTop = 0;
      el.meta.innerHTML = slide.tags.map(tag => `<span class="pill">${tag}</span>`).join('');
      el.counter.textContent = `${state.index + 1} / ${slides.length}`;
      el.progress.style.width = `${((state.index + 1) / slides.length) * 100}%`;
      el.prev.disabled = state.index === 0;
      el.next.textContent = state.index === slides.length - 1 ? '回到開場 ↺' : '下一段 →';
      localStorage.setItem('qnaSlideIndex', String(state.index));
      renderToc();
    }

    function next() {
      state.index = state.index >= slides.length - 1 ? 0 : state.index + 1;
      stopAuto();
      render();
    }
    function prev() {
      state.index -= 1;
      stopAuto();
      render();
    }
    function startAuto() {
      state.auto = true;
      el.auto.textContent = '停止捲動';
      state.timer = setInterval(() => {
        el.dialogue.scrollTop += state.speed;
        const atBottom = el.dialogue.scrollTop + el.dialogue.clientHeight >= el.dialogue.scrollHeight - 4;
        if (atBottom) stopAuto();
      }, 40);
    }
    function stopAuto() {
      state.auto = false;
      el.auto.textContent = '自動捲動';
      if (state.timer) clearInterval(state.timer);
      state.timer = null;
    }
    function toggleAuto() { state.auto ? stopAuto() : startAuto(); }
    function toggleTheme() {
      const nextTheme = el.body.dataset.theme === 'dark' ? 'light' : 'dark';
      el.body.dataset.theme = nextTheme;
      localStorage.setItem('qnaTheme', nextTheme);
    }
    function renderToc() {
      el.toc.innerHTML = slides.map((slide, i) => `<button class="${i === state.index ? 'active' : ''}" data-index="${i}">${i + 1}. ${slide.title}</button>`).join('');
    }
    function renderPrint() {
      el.printAll.innerHTML = `<h1>六大核心能力｜放射科一問一答逐字稿</h1>` + slides.map((slide, i) => `
        <h2>${i + 1}. ${slide.title}</h2>
        ${slide.lines.map(line => `<div class="print-role">${roleNames[line.role].label}</div>${line.text.map(p => `<p>${p}</p>`).join('')}`).join('')}
      `).join('');
    }

    el.prev.addEventListener('click', prev);
    el.next.addEventListener('click', next);
    el.auto.addEventListener('click', toggleAuto);
    el.fullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    });
    el.settings.addEventListener('click', () => el.drawer.classList.toggle('open'));
    el.theme.addEventListener('click', toggleTheme);
    el.fontSize.addEventListener('input', e => {
      document.documentElement.style.setProperty('--font-size', `${e.target.value}px`);
      localStorage.setItem('qnaFontSize', e.target.value);
    });
    el.speed.addEventListener('input', e => {
      state.speed = Number(e.target.value);
      localStorage.setItem('qnaSpeed', e.target.value);
    });
    el.toc.addEventListener('click', e => {
      const button = e.target.closest('button[data-index]');
      if (!button) return;
      state.index = Number(button.dataset.index);
      stopAuto();
      render();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === ' ') { e.preventDefault(); toggleAuto(); }
      if (e.key.toLowerCase() === 'f') el.fullscreen.click();
      if (e.key.toLowerCase() === 't') toggleTheme();
      if (e.key === 'Escape') el.drawer.classList.remove('open');
    });

    const savedTheme = localStorage.getItem('qnaTheme');
    if (savedTheme) el.body.dataset.theme = savedTheme;
    const savedFontSize = localStorage.getItem('qnaFontSize');
    if (savedFontSize) {
      el.fontSize.value = savedFontSize;
      document.documentElement.style.setProperty('--font-size', `${savedFontSize}px`);
    }
    el.speed.value = state.speed;
    renderPrint();
    render();
  </script>
